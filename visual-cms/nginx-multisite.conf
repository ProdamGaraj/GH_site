# =============================================================================
# Multi-site nginx configuration
# Supports: subdomains, path-prefix, custom-domain routing
# =============================================================================

# --- Shared settings ---
charset utf-8;
charset_types text/html text/css text/plain application/json application/javascript;

gzip on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

# --- Map subdomains to site folders ---
# Map $host to $site_root:
#   premium.goldenhouse.com → /usr/share/nginx/html/sites/premium
#   goldenhouse.com         → /usr/share/nginx/html/sites/main (default)
map $host $site_slug {
    default                   "main";
    # Add subdomains here (or auto-generate via deploy):
    # ~^(?<sub>.+)\.goldenhouse\.com$  $sub;
}

# =============================================================================
# HTTP → HTTPS redirect (all domains)
# =============================================================================
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# =============================================================================
# Main site — goldenhouse.com www.goldenhouse.com
# =============================================================================
server {
    listen 443 ssl;
    server_name goldenhouse.com www.goldenhouse.com;
    root /usr/share/nginx/html/sites/main;
    index index.html;

    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    charset utf-8;
    charset_types text/html text/css text/plain application/json application/javascript;

    # SEO: sitemap and robots are per-site
    location = /sitemap.xml { try_files /sitemap.xml =404; }
    location = /robots.txt  { try_files /robots.txt =404; }

    # Static assets
    location ~* \.(jpg|jpeg|png|gif|ico|svg|css|js|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API reverse proxy
    location ^~ /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Path-prefix routing: /premium/ → sites/premium/
    # Each path-based site gets its own location block
    # Example (auto-generated per site with routingMode='path-prefix'):
    # location /premium/ {
    #     alias /usr/share/nginx/html/sites/premium/;
    #     try_files $uri $uri.html $uri/ /premium/index.html;
    # }

    # Clean URLs
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

# =============================================================================
# Subdomain sites — *.goldenhouse.com
# Each subdomain resolves to its own site folder for independent SEO
# Google treats each subdomain as a separate site property
# =============================================================================
server {
    listen 443 ssl;
    server_name ~^(?<subdomain>.+)\.goldenhouse\.com$;
    root /usr/share/nginx/html/sites/$subdomain;
    index index.html;

    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    charset utf-8;
    charset_types text/html text/css text/plain application/json application/javascript;

    # Per-site SEO files
    location = /sitemap.xml { try_files /sitemap.xml =404; }
    location = /robots.txt  { try_files /robots.txt =404; }

    # Static assets
    location ~* \.(jpg|jpeg|png|gif|ico|svg|css|js|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API reverse proxy (shared backend)
    location ^~ /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Clean URLs
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

# =============================================================================
# Custom domain sites
# For each custom domain, add a server block here (or auto-generate via deploy)
# Example:
#
# server {
#     listen 443 ssl;
#     server_name custom-landing.com www.custom-landing.com;
#     root /usr/share/nginx/html/sites/custom-landing;
