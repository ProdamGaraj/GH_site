# =============================================================================
# Public-site nginx — PROD environment (Vite dev).
# The whole site lives at the apex domain https://gh.uz/.
# Only `server_name` differs from the other envs; all common config lives in
# nginx-public.shared.conf (mounted at /etc/nginx/snippets/visual-cms.conf).
# =============================================================================

# WebSocket upgrade map (http-level; needed for the Vite HMR proxy in the include)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name gh.uz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name gh.uz;
    include /etc/nginx/snippets/visual-cms.conf;
}
