# ===========================================
# PROD environment override (Vite dev) — whole site at apex domain https://gh.uz/
# Layered on top of the base (local) docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Only the per-environment differences live here.
#
# NOTE: the previous static-build prod setup was renamed to
#       docker-compose.build.yml.
# ===========================================

services:
  public-site:
    # !override replaces the base volume list (avoids merging two bind mounts
    # onto the same target /etc/nginx/conf.d/default.conf).
    volumes: !override
      - ./public-site:/usr/share/nginx/html:ro
      - ./nginx-public.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx-public.shared.conf:/etc/nginx/snippets/visual-cms.conf:ro
      - ./ssl:/etc/nginx/ssl:ro

  frontend:
    command: npm run dev -- --mode production

  backend:
    environment:
      - PUBLIC_SITE_URL=https://gh.uz
      # Боевой сайт на HTTPS — cookie только по защищённому соединению.
      - COOKIE_SECURE=true
      # Секрет берём из окружения хоста (НЕ коммитим реальное значение).
      # Задать на сервере: export JWT_SECRET=... перед `docker compose up`.
      - JWT_SECRET=${JWT_SECRET}
