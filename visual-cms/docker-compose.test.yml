# ===========================================
# TEST environment override (host .19, domain test_analytics.gh.uz)
# Layered on top of the base (local) docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.test.yml up -d
# Only the per-environment differences live here.
# ===========================================

services:
  public-site:
    # !override replaces the base volume list (avoids merging two bind mounts
    # onto the same target /etc/nginx/conf.d/default.conf).
    volumes: !override
      - ./public-site:/usr/share/nginx/html:ro
      - ./nginx-public.test.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx-public.shared.conf:/etc/nginx/snippets/visual-cms.conf:ro
      - ./ssl:/etc/nginx/ssl:ro

  frontend:
    command: npm run dev -- --mode test

  backend:
    environment:
      - PUBLIC_SITE_URL=https://test_analytics.gh.uz
