version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      target: development
    ports:
      - "3000:3000"
    # VITE_API_URL намеренно не задан: дефолт в коде — относительный '/api',
    # запросы идут same-origin через vite-proxy (см. vite.config.ts). Это
    # работает в локальном dev, через port-forward и через https-туннели
    # (Dev Tunnels / ngrok / Cloudflare Tunnel). Задавать абсолютный URL
    # нельзя — он зашьётся в бандл и сломает доступ с другого хоста.
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev
  
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://cms_user:cms_password@postgres:5432/visual_cms
      - REDIS_URL=redis://redis:6379
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=cms-media
      - PUBLIC_MEDIA_URL=/media
      - PUBLIC_SITE_DIR=/app/public-site
      - PUBLIC_SITE_URL=https://localhost
      # SSRF allowlist: доверенные внутренние хосты, которые резолвятся в
      # приватные IP и иначе блокируются ssrfGuard (см. B4 в KNOWN_ISSUES).
      # Точное совпадение hostname, lowercase, через запятую.
      - SSRF_ALLOWED_HOSTS=api.macrocrm.gh.uz
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./public-site:/app/public-site
      - ./scripts:/app/scripts
    depends_on:
      - postgres
      - redis
      - minio
    command: npm run dev
  
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=cms_user
      - POSTGRES_PASSWORD=cms_password
      - POSTGRES_DB=visual_cms
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C.UTF-8
      - LANG=C.UTF-8
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms_user"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
  
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Статический сервер для опубликованного сайта
  public-site:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./public-site:/usr/share/nginx/html:ro
      - ./nginx-public.local.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx-public.shared.conf:/etc/nginx/snippets/visual-cms.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend

volumes:
  postgres-data:
  redis-data:
  minio-data:
