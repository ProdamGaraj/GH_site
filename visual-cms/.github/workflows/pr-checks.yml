# ===========================================
# PR Checks Workflow
# Runs on every pull request
# ===========================================

name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # ===========================================
  # Check PR Title (Conventional Commits)
  # ===========================================
  pr-title:
    name: PR Title Check
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false

  # ===========================================
  # Check for Changes
  # ===========================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            backend:
              - 'visual-cms/backend/**'
            frontend:
              - 'visual-cms/frontend/**'
            docs:
              - 'docs/**'
              - '**/*.md'

  # ===========================================
  # Backend Checks
  # ===========================================
  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: visual-cms/backend/package-lock.json

      - name: Install dependencies
        working-directory: visual-cms/backend
        run: npm ci

      - name: Type check
        working-directory: visual-cms/backend
        run: npm run build

      - name: Run tests
        working-directory: visual-cms/backend
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          NODE_ENV: test
        run: npm test -- --coverage --passWithNoTests

  # ===========================================
  # Frontend Checks
  # ===========================================
  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: visual-cms/frontend/package-lock.json

      - name: Install dependencies
        working-directory: visual-cms/frontend
        run: npm ci

      - name: Type check
        working-directory: visual-cms/frontend
        run: npm run build

  # ===========================================
  # Danger JS (PR Review Bot)
  # ===========================================
  danger:
    name: Danger JS
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Danger
        run: |
          # Create simple danger rules if needed
          echo "PR checks passed!"
