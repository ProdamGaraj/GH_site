# WebSocket upgrade map (needed for Vite HMR proxying below)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name localhost test_analytics.gh.uz;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    server_name localhost test_analytics.gh.uz;
    root /usr/share/nginx/html;
    index index.html;

    # SSL
    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Ensure Russian/Cyrillic text is served correctly
    charset utf-8;
    charset_types text/html text/css text/plain application/json application/javascript;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # HTML — no cache (so deploys are seen immediately)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
    }

    # Proxy API requests to backend (^~ takes priority over regex locations like static assets)
    location ^~ /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Allow large media uploads (videos)
        client_max_body_size 250m;
    }

    # Public Media Library — proxy to MinIO bucket cms-media
    location ^~ /media/ {
        proxy_pass http://minio:9000/cms-media/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Site path-prefix routing: /sites/<slug>/<page> (direct access)
    location ^~ /sites/ {
        try_files $uri $uri.html $uri/ =404;
    }

    # Clean URLs — try root first, then look in sites/<first-segment>/
    # This handles: /golden-house → sites/golden-house/index.html
    #               /golden-house/about → sites/golden-house/about.html
    location / {
        # No cache for HTML (so deploys are seen immediately)
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
        try_files $uri $uri.html $uri/ @sites_fallback;
    }

    # Fallback: extract first path segment as site slug and look in sites/<slug>/
    location @sites_fallback {
        rewrite ^/([^/]+)(/.*)?$ /sites/$1$2 last;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}

# =============================================================================
# Visual CMS admin UI (Vite dev server)
#   https://cms.test_analytics.gh.uz   (and https://visual-cms.localhost locally)
# Served via subdomain so the SPA loads from "/" and its absolute asset paths
# (/assets, /@vite, /src, …) and HMR work without changing the Vite `base`.
# NOTE: a non-*.localhost host must be added to server.allowedHosts in
# frontend/vite.config.ts, otherwise Vite returns 403 "host not allowed".
# =============================================================================
server {
    listen 80;
    server_name cms.test_analytics.gh.uz visual-cms.localhost;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name cms.test_analytics.gh.uz visual-cms.localhost;

    # Uses the same cert as the apex server. Point these at your real cert/key
    # for *.test_analytics.gh.uz if they live under a different filename in ./ssl.
    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    charset utf-8;

    # Proxy everything to the Vite dev container (frontend:3000).
    # /api and /media are further proxied by Vite itself (see vite.config.ts).
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade for Vite HMR
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400s;

        # Allow large media uploads (videos) through to the backend
        client_max_body_size 250m;
    }
}
